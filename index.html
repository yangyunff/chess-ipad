<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta http-equiv="refresh" content="0; url=./ipad.html">
  <title>Redirecting to iPad Version</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #eef5f1, #dbe9df 48%, #c1d7c8);
      color: #23413a;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    }

    .card {
      width: min(92vw, 520px);
      padding: 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 18px 44px rgba(74, 104, 88, 0.16);
      text-align: center;
    }

    a {
      color: #4f7480;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Opening the iPad chess version</h1>
    <p>If the page does not redirect automatically, tap <a href="./ipad.html">here</a>.</p>
  </div>
  <script>
    window.location.replace("./ipad.html");
  </script>
</body>
</html>
